<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We are Laundry - Fasilitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .dark-mode { background-color: #121212; color: #ffffff; }
        .dark-mode .navbar, .dark-mode footer, .dark-mode .card { background-color: #1f1f1f !important; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">We Are Laundry</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li><a class="nav-link" href="index.html">Beranda</a></li>
                    <li><a class="nav-link" href="services.html">Layanan & Harga</a></li>
                    <li><a class="nav-link active text-primary" href="fasilitas.html">Fasilitas</a></li>
                    <li><a class="nav-link" href="order.html">Pesan Antar</a></li>
                    <li><a class="nav-link" href="about.html">Tentang Kami</a></li>
                </ul>
                <button class="btn btn-sm btn-outline-secondary ms-3" id="themeToggle">🌙 Mode</button>
            </div>
        </div>
    </nav>
<style>
.card-img-top {
    width: 100%;
    height: 250px;
    object-fit: cover;
}
</style>

<div class="container my-5">
    <h2 class="fw-bold text-center mb-5">Fasilitas We Are Laundry</h2>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm rounded overflow-hidden">
                <img src="mesin_cuci.jpg" class="card-img-top" alt="Mesin Cuci Modern">
                <div class="card-body text-center">
                    <p class="card-text fw-semibold">Mesin Cuci High-End</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm rounded overflow-hidden">
                <img src="setrika.jpg" class="card-img-top" alt="Proses Setrika">
                <div class="card-body text-center">
                    <p class="card-text fw-semibold">Setrika Uap Premium</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm rounded overflow-hidden">
                <img src="packing.jpg" class="card-img-top" alt="Pakaian Rapi">
                <div class="card-body text-center">
                    <p class="card-text fw-semibold">Packing Higienis & Rapi</p>
                </div>
            </div>
        </div>
    </div>
</div>

    <footer class="bg-light text-center py-4 mt-5 border-top">
        <p class="mb-0">&copy; 2026 We Are Laundry.</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); }
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
