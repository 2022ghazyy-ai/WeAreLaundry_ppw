<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .dark-mode { background-color: #121212; color: #ffffff; }
        .dark-mode .navbar, .dark-mode footer, .dark-mode .card { background-color: #1f1f1f !important; color: white; }
        .dark-mode .text-muted { color: #aaa !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">We Are Laundry</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li class="nav-item"><a class="nav-link active text-primary" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="services.html">Layanan & Harga</a></li>
                    <li class="nav-item"><a class="nav-link" href="fasilitas.html">Fasilitas</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Pesan Antar</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Tentang Kami</a></li>
                </ul>
                <button class="btn btn-sm btn-outline-secondary ms-3" id="themeToggle">🌙 Mode</button>
            </div>
        </div>
    </nav>

    <div class="container my-5 py-5 text-center">
        <h1 class="display-4 fw-bold">Pakaian Kotor Menumpuk?<br><span class="text-primary">Kami Siap Bereskan!</span></h1>
        <p class="lead text-muted my-4">Layanan laundry profesional, cepat, higienis, dan ramah di kantong.</p>
        <a href="order.html" class="btn btn-primary btn-lg px-4 shadow">Pesan Antar-Jemput Sekarang</a>
    </div>

    <div class="container text-center my-5 py-3">
    <h3 class="fw-bold mb-4">Lihat Proses Kebersihan Kami</h3>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/lRI3EWuCpAc?si=jlWFrVQonSxRs0aA" 
    title="YouTube video player" 
    frameborder="0" 
    allow="accelerometer; 
    autoplay; clipboard-write; 
    encrypted-media; 
    gyroscope; 
    picture-in-picture; 
    web-share" 
    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>

    <footer class="bg-light text-center py-4 mt-5 border-top">
        <p class="mb-0">&copy; 2026 We Are Laundry.</p>
    </footer>

    <script>
       const body = document.body;
        const navbar = document.querySelector(".navbar");
        const themeToggle = document.getElementById("themeToggle");

        function applyTheme(isDark) {
            body.classList.toggle("dark-mode", isDark);
            navbar.classList.toggle("navbar-dark", isDark);
            navbar.classList.toggle("bg-dark", isDark);
            navbar.classList.toggle("navbar-light", !isDark);
            navbar.classList.toggle("bg-light", !isDark);

            if (themeToggle) {
                themeToggle.textContent = isDark ? "☀️ Light" : "🌙 Dark";
            }
        }

        const savedTheme = localStorage.getItem("theme");
        applyTheme(savedTheme === "dark");

        if (themeToggle) {
            themeToggle.addEventListener("click", () => {
                const isDark = !body.classList.contains("dark-mode");
                applyTheme(isDark);
                localStorage.setItem("theme", isDark ? "dark" : "light");
            });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
